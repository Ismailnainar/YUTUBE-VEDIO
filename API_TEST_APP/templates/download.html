<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Cloudflare MP3 Uploader</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* === General === */
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Floating background circles */
        .circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.2;
            animation: float 20s infinite linear;
        }

        .circle:nth-child(1) {
            width: 200px;
            height: 200px;
            background: #fff;
            top: 10%;
            left: 20%;
        }

        .circle:nth-child(2) {
            width: 300px;
            height: 300px;
            background: #ffeb3b;
            top: 50%;
            left: 70%;
        }

        .circle:nth-child(3) {
            width: 150px;
            height: 150px;
            background: #00e5ff;
            top: 80%;
            left: 40%;
        }

        @keyframes float {
            0% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-50px) rotate(180deg);
            }

            100% {
                transform: translateY(0px) rotate(360deg);
            }
        }

        /* Card container */
        .container {
            position: relative;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            width: 400px;
            text-align: center;
            z-index: 10;
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            0% {
                transform: translateY(50px);
                opacity: 0;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        h2 {
            margin-bottom: 30px;
            color: #333;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #007bff;
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.3);
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.3);
        }

        .success,
        .error {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: 600;
            animation: fadeIn 0.8s ease-out;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .download-btn {
            margin-top: 15px;
            display: inline-block;
            background: #28a745;
            color: #fff;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            background: #1e7e34;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <!-- Floating circles -->
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>

    <div class="container">
        <h2>🎵 Cloudflare MP3 Uploader</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="text" name="url" placeholder="Enter YouTube or song link" required>
            <button type="submit">🎧 Convert & Upload</button>
        </form>

        {% if success %}
        <div class="success">
            ✅ "{{ file_name }}" uploaded successfully!<br>
            Click below to download.
            <br>
            <a href="{{ file_url }}" class="download-btn" id="autoDownload" download>⬇️ Download Now</a>
        </div>

        <script>
            window.onload = function () {
                const btn = document.getElementById("autoDownload");
                if (btn) {
                    setTimeout(() => {
                        alert("🎉 Upload complete! Click OK to start downloading your song.");
                        btn.click();
                    }, 500);  // small delay for animation
                }
            };
        </script>
        {% endif %}

        {% if error %}
        <div class="error">
            ❌ Error: {{ error }}
        </div>
        {% endif %}

    </div>

</body>

</html>
